name: generate animation

on:
  # 每24小时自动运行
  schedule:
    - cron: "0 */24 * * *"

  # 允许手动触发
  workflow_dispatch:

  # main分支推送时运行
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # 添加必要的权限
    permissions:
      contents: write  # 允许写入仓库内容（推送分支）
      pages: write     # 允许操作pages（如果用到）
      id-token: write

    steps:
      # 检出仓库代码（解决目录不存在问题）
      - name: Checkout repository
        uses: actions/checkout@v4

      # 创建dist目录（避免目录不存在报错）
      - name: Create dist directory
        run: mkdir -p dist

      # 生成贪吃蛇SVG动画
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}  # 修复空格问题
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 推送SVG文件到output分支
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output  # 目标分支
          build_dir: dist        # 要推送的目录
          force_orphan: true     # 强制创建孤儿分支（首次运行需要）
          keep_history: false    # 不保留历史记录（减少体积）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
